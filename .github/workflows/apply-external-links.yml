name: Aplicar links externos no blog

on:
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  apply-links:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Aplicar links externos preenchidos em content-externo/links.json
        run: node scripts/apply-external-links.js

      - name: Commit e push
        run: |
          git config user.name "psprotecao-blog-bot"
          git config user.email "actions@users.noreply.github.com"
          git add blog/ content-externo/links.json
          git diff --cached --quiet && echo "Nada para commitar" && exit 0
          git commit -m "Aplica links externos (Substack/Medium/LinkedIn) no blog [skip ci]"
          git push
